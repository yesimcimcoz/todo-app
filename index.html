<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-overlay" class="login-overlay hidden">
    <form id="auth-form" class="login-box">
      <h2 id="auth-title">🔒 Giriş</h2>
      <p id="auth-subtitle">Listeyi görmek için giriş yap.</p>
      <input type="email" id="auth-email" placeholder="E-posta" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Şifre" autocomplete="current-password">
      <button type="submit" id="auth-submit">Giriş yap</button>
      <span id="auth-error" class="login-error"></span>
      <span id="auth-info" class="login-info"></span>
      <p class="auth-toggle">
        <span id="auth-toggle-text">Hesabın yok mu?</span>
        <button type="button" id="auth-toggle-btn">Kayıt ol</button>
      </p>
    </form>
  </div>

  <div class="container">
    <h1>
      👹 Yap ya da Yapma Listesi
      <button id="logout-btn" class="logout-btn hidden" title="Çıkış yap">Çıkış</button>
    </h1>

    <form id="todo-form" class="todo-form">
      <input type="text" id="todo-input" placeholder="Ne yapalım?" autocomplete="off">
      <input type="text" id="todo-assignee" placeholder="Kim yapacak?" autocomplete="off">
      <input type="date" id="todo-date" title="Son bitirme tarihi">
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="today">Bugün</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="completed">Tamamlanan</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="item-count">0 görev</span>
      <button id="clear-completed">Tamamlananları temizle</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
